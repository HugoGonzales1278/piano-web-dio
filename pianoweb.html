<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Arranjador 61 Teclas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d1a;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
  }
  #piano-app {
    background: #1a1a2e;
    border-radius: 18px;
    padding: 18px 16px 20px;
    max-width: 960px;
    width: 100%;
    border: 1px solid #2a2a4a;
  }
  .piano-brand {
    text-align: center;
    font-size: 11px;
    color: #5555aa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  #panel-top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: start;
    gap: 10px;
    margin-bottom: 14px;
  }
  .panel-block {
    background: #111128;
    border-radius: 10px;
    padding: 10px 12px;
    border: 0.5px solid #2a2a5a;
  }
  .panel-label { font-size: 10px; color: #7070aa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  #led-display {
    background: #0d1a0d;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Courier New', monospace;
    color: #44ff66;
    text-shadow: 0 0 6px #22cc44;
    min-width: 200px;
    text-align: center;
    border: 1px solid #1a3a1a;
    letter-spacing: 0.05em;
  }
  #led-note { font-size: 24px; font-weight: 700; color: #66ff88; }
  #led-info { font-size: 12px; color: #22aa44; margin-top: 3px; }
  #led-octave { font-size: 10px; color: #117733; margin-top: 2px; }
  .control-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ctrl-label { font-size: 10px; color: #7070aa; min-width: 54px; }
  input[type=range] { flex: 1; height: 3px; accent-color: #8888ff; cursor: pointer; }
  .ctrl-val { font-size: 11px; color: #aaaacc; min-width: 28px; text-align: right; }
  .btn-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .btn-sm {
    background: #1e1e3a; border: 0.5px solid #3a3a6a; border-radius: 5px;
    color: #9999cc; font-size: 10px; padding: 4px 7px; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .btn-sm:hover { background: #2a2a5a; color: #ccccff; }
  .btn-sm.active { background: #4a3aaa; color: #eeeeff; border-color: #8888ff; }
  .select-ctrl {
    background: #1e1e3a; border: 0.5px solid #3a3a6a; border-radius: 5px;
    color: #aaaacc; font-size: 11px; padding: 4px 6px; width: 100%; outline: none;
  }
  .section-title { font-size: 10px; color: #6666aa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  #keyboard-wrap {
    background: #0f0f1e; border-radius: 10px; padding: 14px 8px 16px;
    overflow-x: auto; border: 0.5px solid #2a2a4a;
  }
  #keyboard {
    display: flex; position: relative;
    height: 130px; width: max-content; margin: 0 auto;
  }
  .key-white {
    width: 36px; height: 130px;
    background: linear-gradient(to bottom, #f0f0f0, #ffffff);
    border: 1px solid #bbb; border-radius: 0 0 5px 5px;
    margin-right: 1px; cursor: pointer; position: relative;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 5px; transition: background 0.06s; user-select: none; flex-shrink: 0;
  }
  .key-white:active, .key-white.pressed { background: linear-gradient(to bottom, #d8d0ff, #c0b8ff); }
  .key-white .key-label { font-size: 8px; color: #888; pointer-events: none; }
  .key-black {
    width: 22px; height: 82px;
    background: linear-gradient(to bottom, #222, #111);
    border-radius: 0 0 4px 4px; position: absolute; top: 0;
    cursor: pointer; z-index: 2; transition: background 0.06s; user-select: none;
  }
  .key-black:active, .key-black.pressed { background: linear-gradient(to bottom, #5533aa, #3322aa); }
  #bottom-bar {
    display: flex; gap: 8px; margin-top: 12px;
    flex-wrap: wrap; align-items: center; justify-content: center;
  }
  .btn-action {
    background: #1e1e3a; border: 0.5px solid #3a3a6a; border-radius: 7px;
    color: #aaaacc; font-size: 11px; padding: 6px 14px; cursor: pointer;
    transition: background 0.12s;
  }
  .btn-action:hover { background: #2e2e5a; color: #ddddff; }
  .btn-action.rec { border-color: #ff4444; color: #ff6666; }
  .btn-action.rec.active { background: #3a1010; color: #ff4444; }
  .btn-action.play.active { background: #103a10; color: #44ff66; border-color: #44ff66; }
  #status-bar { text-align: center; font-size: 11px; color: #5555aa; margin-top: 10px; }
</style>
</head>
<body>

  <div class="piano-brand">◆ arranjador digital 61 teclas ◆</div>

  <div id="panel-top">

        <option>Órgão Clássico</option><option>Órgão Hammond</option><option>Guitarra Acústica</option>

        <option>Viola</option><option>Violoncelo</option><option>Contrabaixo</option>

  <!-- Teclado -->

  </div>

  <!-- Botões de controle -->
  <div id="bottom-bar">
    <button class="btn-action rec" id="btn-rec">⏺ Gravar</button>
    <button class="btn-action play" id="btn-play" disabled>▶ Reproduzir</button>
    <button class="btn-action" id="btn-stop">⏹ Parar</button>
    <button class="btn-action" id="btn-demo">♪ Demo</button>
    <button class="btn-action" id="btn-clear">✕ Limpar</button>

  <div id="status-bar">
    Clique nas teclas ou use o teclado: A–K = Dó a Si (brancas) · W E T Y U = sustenidos
  </div>

<script>
// ─── Constantes musicais ────────────────────────────────────────────────────
const NOTE_NAMES  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE_NOTES = [0,2,4,5,7,9,11];
const BLACK_NOTES = [1,3,6,8,10];
const NOTE_LABELS = ['Dó','Ré','Mi','Fá','Sol','Lá','Si'];
const MIDI_START  = 36; // C2
const TOTAL_KEYS  = 61;

// ─── Timbres (envelope ADSR simplificado) ──────────────────────────────────
const TIMBRES = [
  { name:'Piano Acústico',    wave:'triangle', attack:0.01, decay:0.30, sustain:0.60, release:0.80 },
  { name:'Piano Elétrico',    wave:'square',   attack:0.01, decay:0.20, sustain:0.50, release:0.50 },
  { name:'Cravo',             wave:'sawtooth', attack:0.001,decay:0.15, sustain:0.20, release:0.30 },
  { name:'Órgão Clássico',    wave:'sine',     attack:0.05, decay:0.00, sustain:1.00, release:0.10 },
  { name:'Órgão Hammond',     wave:'square',   attack:0.02, decay:0.00, sustain:0.90, release:0.10 },
  { name:'Guitarra Acústica', wave:'triangle', attack:0.005,decay:0.50, sustain:0.30, release:1.00 },
  { name:'Guitarra Elétrica', wave:'sawtooth', attack:0.01, decay:0.30, sustain:0.70, release:0.40 },
  { name:'Guitarra Distorcida',wave:'square',  attack:0.01, decay:0.10, sustain:0.90, release:0.20 },
  { name:'Baixo Elétrico',    wave:'sine',     attack:0.02, decay:0.40, sustain:0.60, release:0.50 },
  { name:'Baixo Fretless',    wave:'triangle', attack:0.05, decay:0.30, sustain:0.70, release:0.40 },
  { name:'Cordas',            wave:'sawtooth', attack:0.15, decay:0.10, sustain:0.80, release:0.50 },
  { name:'Violino',           wave:'sawtooth', attack:0.10, decay:0.10, sustain:0.90, release:0.30 },
  { name:'Viola',             wave:'sawtooth', attack:0.12, decay:0.10, sustain:0.85, release:0.35 },
  { name:'Violoncelo',        wave:'sawtooth', attack:0.14, decay:0.10, sustain:0.85, release:0.40 },
  { name:'Contrabaixo',       wave:'triangle', attack:0.10, decay:0.20, sustain:0.70, release:0.50 },
  { name:'Flauta',            wave:'sine',     attack:0.10, decay:0.05, sustain:0.90, release:0.30 },
  { name:'Flauta Doce',       wave:'sine',     attack:0.08, decay:0.05, sustain:0.85, release:0.25 },
  { name:'Oboé',              wave:'sawtooth', attack:0.06, decay:0.08, sustain:0.80, release:0.20 },
  { name:'Clarinete',         wave:'square',   attack:0.06, decay:0.05, sustain:0.85, release:0.20 },
  { name:'Fagote',            wave:'sawtooth', attack:0.08, decay:0.10, sustain:0.80, release:0.25 },
  { name:'Saxofone Alto',     wave:'sawtooth', attack:0.08, decay:0.10, sustain:0.80, release:0.20 },
  { name:'Saxofone Tenor',    wave:'sawtooth', attack:0.09, decay:0.10, sustain:0.75, release:0.22 },
  { name:'Trompete',          wave:'square',   attack:0.05, decay:0.10, sustain:0.70, release:0.15 },
  { name:'Trombone',          wave:'sawtooth', attack:0.07, decay:0.10, sustain:0.75, release:0.20 },
  { name:'Tuba',              wave:'triangle', attack:0.08, decay:0.15, sustain:0.70, release:0.25 },
  { name:'Corne Francês',     wave:'sawtooth', attack:0.10, decay:0.10, sustain:0.70, release:0.20 },
  { name:'Sintetizador Lead', wave:'square',   attack:0.001,decay:0.20, sustain:0.70, release:0.50 },
  { name:'Sintetizador Pad',  wave:'sine',     attack:0.30, decay:0.10, sustain:0.90, release:0.80 },
  { name:'Sintetizador Bass', wave:'sawtooth', attack:0.001,decay:0.30, sustain:0.60, release:0.40 },
  { name:'Vibrafone',         wave:'sine',     attack:0.001,decay:0.50, sustain:0.40, release:1.00 },
  { name:'Marimba',           wave:'triangle', attack:0.001,decay:0.40, sustain:0.20, release:0.80 },
  { name:'Xilofone',          wave:'triangle', attack:0.001,decay:0.30, sustain:0.15, release:0.60 },
  { name:'Glockenspiel',      wave:'sine',     attack:0.001,decay:0.60, sustain:0.30, release:1.20 },
  { name:'Acordeão',          wave:'sawtooth', attack:0.05, decay:0.05, sustain:0.90, release:0.15 },
  { name:'Harpa',             wave:'triangle', attack:0.001,decay:0.60, sustain:0.30, release:1.20 },
  { name:'Alaúde',            wave:'triangle', attack:0.002,decay:0.55, sustain:0.25, release:1.00 },
  { name:'Banjo',             wave:'triangle', attack:0.001,decay:0.45, sustain:0.20, release:0.90 },
  { name:'Mandolim',          wave:'triangle', attack:0.001,decay:0.40, sustain:0.15, release:0.80 },
  { name:'Ukulele',           wave:'triangle', attack:0.003,decay:0.35, sustain:0.20, release:0.70 },
  { name:'Sitar',             wave:'sawtooth', attack:0.005,decay:0.60, sustain:0.40, release:1.00 },
];

// ─── Estado da aplicação ────────────────────────────────────────────────────
let audioCtx     = null;
let volume       = 0.75;
let rhythmVol    = 0.60;
let tempo        = 120;
let octave       = 4;
let sustain      = false;
let vibrato      = false;
let metro        = false;
let autoChord    = false;
let isRecording  = false;
let recordedNotes = [];
let recStart     = 0;
let activeNodes  = {};
let metroInterval = null;
let metroBeat    = 0;
let timbreIdx    = 0;
let demoIdx      = 0;

// ─── Demos (melodias MIDI) ──────────────────────────────────────────────────
const DEMO_SONGS = [
  // Escala maior
  [60,62,64,65,67,69,71,72,71,69,67,65,64,62,60],
  // Ode à Alegria (Beethoven)
  [64,64,65,67,67,65,64,62,60,60,62,64,64,62,62],
  // Parabéns
  [60,60,62,60,65,64,60,60,62,60,67,65,60,60,72,69,65,64,62],
  // Escala pentatônica
  [60,62,64,67,69,72,69,67,64,62,60],
  // Arpejo de Dó maior
  [60,64,67,72,67,64,60,62,65,69,72,69,65,62],
];

// ─── Utilitários ────────────────────────────────────────────────────────────
function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function updateLed(midiNote) {
  const noteName = NOTE_NAMES[midiNote % 12];
  const oct      = Math.floor(midiNote / 12) - 1;
  document.getElementById('led-note').textContent   = noteName + oct;
  document.getElementById('led-info').textContent   = TIMBRES[timbreIdx].name;
  document.getElementById('led-octave').textContent = `Oitava: ${octave} | BPM: ${tempo}`;
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ─── Motor de áudio ─────────────────────────────────────────────────────────
function playNote(midiNote, keyEl) {
  const ctx = getCtx();
  const t   = TIMBRES[timbreIdx] || TIMBRES[0];
  const now = ctx.currentTime;

  // Encerrar nota anterior na mesma tecla
  if (activeNodes[midiNote]) stopNote(midiNote);

  const osc      = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.type = t.wave;
  osc.frequency.setValueAtTime(midiToFreq(midiNote), now);

  // Vibrato opcional
  if (vibrato) {
    const lfo     = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 5.5;
    lfoGain.gain.value  = 4;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start(now);
    setTimeout(() => { try { lfo.stop(); } catch(e){} }, 4000);
  }

  // Envelope ADSR
  const vol = volume * 0.35;
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(vol, now + t.attack);
  gainNode.gain.linearRampToValueAtTime(vol * t.sustain, now + t.attack + t.decay);

  osc.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.start(now);

  // Tecla visual
  if (keyEl) keyEl.classList.add('pressed');
  activeNodes[midiNote] = { osc, gainNode, keyEl };

  updateLed(midiNote);

  // Acorde automático (tríade maior)
  if (autoChord && WHITE_NOTES.includes(midiNote % 12)) {
    setTimeout(() => playNote(midiNote + 4, null), 10);
    setTimeout(() => playNote(midiNote + 7, null), 20);
  }

  // Gravação
  if (isRecording) {
    recordedNotes.push({ midi: midiNote, time: Date.now() - recStart });
  }

  // Auto-release se sustain desligado
  if (!sustain) {
    const durMs = (t.attack + t.decay + 0.4) * 1000;
    setTimeout(() => stopNote(midiNote), durMs + 600);
  }
}

function stopNote(midiNote) {
  const node = activeNodes[midiNote];
  if (!node) return;
  const ctx = getCtx();
  const now = ctx.currentTime;
  const t   = TIMBRES[timbreIdx] || TIMBRES[0];
  node.gainNode.gain.cancelScheduledValues(now);
  node.gainNode.gain.setValueAtTime(node.gainNode.gain.value, now);
  node.gainNode.gain.linearRampToValueAtTime(0, now + t.release);
  const stopMs = (t.release + 0.1) * 1000;
  setTimeout(() => { try { node.osc.stop(); } catch(e){} }, stopMs);
  if (node.keyEl) node.keyEl.classList.remove('pressed');
  delete activeNodes[midiNote];
}

// ─── Construção do teclado ──────────────────────────────────────────────────
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';

  // Teclas brancas
  const whiteEls = [];
  for (let i = 0; i < TOTAL_KEYS; i++) {
    const midi = MIDI_START + i;
    if (WHITE_NOTES.includes(midi % 12)) {
      const el = document.createElement('div');
      el.className   = 'key-white';
      el.dataset.midi = midi;
      const lbl = document.createElement('span');
      lbl.className  = 'key-label';
      if (midi % 12 === 0) lbl.textContent = 'C' + (Math.floor(midi / 12) - 1);
      el.appendChild(lbl);
      el.addEventListener('pointerdown', e => { e.preventDefault(); playNote(midi, el); });
      el.addEventListener('pointerup',   () => { if (!sustain) stopNote(midi); });
      el.addEventListener('pointerleave',() => { if (!sustain) stopNote(midi); });
      kb.appendChild(el);
      whiteEls.push({ midi, el });
    }
  }

  // Teclas pretas (posicionadas sobre as brancas)
  let whiteIdx = 0;
  for (let i = 0; i < TOTAL_KEYS; i++) {
    const midi = MIDI_START + i;
    const note = midi % 12;
    if (WHITE_NOTES.includes(note)) {
      whiteIdx++;
    } else if (BLACK_NOTES.includes(note)) {
      // Tecla branca anterior
      const prevWhite = whiteEls[whiteIdx - 1];
      if (prevWhite) {
        const el = document.createElement('div');
        el.className    = 'key-black';
        el.dataset.midi = midi;
        const leftPx = prevWhite.el.offsetLeft + 36 - 11;
        el.style.left   = leftPx + 'px';
        el.addEventListener('pointerdown', e => { e.preventDefault(); playNote(midi, el); });
        el.addEventListener('pointerup',   () => { if (!sustain) stopNote(midi); });
        el.addEventListener('pointerleave',() => { if (!sustain) stopNote(midi); });
        kb.appendChild(el);
      }
    }
  }
}

// ─── Mapeamento do teclado do computador ────────────────────────────────────
const KB_MAP = {
  'a':60,'w':61,'s':62,'e':63,'d':64,'f':65,'t':66,
  'g':67,'y':68,'h':69,'u':70,'j':71,'k':72
};

document.addEventListener('keydown', e => {
  if (e.repeat || e.ctrlKey || e.altKey || e.metaKey) return;
  const baseMidi = KB_MAP[e.key.toLowerCase()];
  if (baseMidi === undefined) return;
  const midi = baseMidi + (octave - 4) * 12;
  const el   = document.querySelector(`[data-midi="${midi}"]`);
  playNote(midi, el);
});

document.addEventListener('keyup', e => {
  const baseMidi = KB_MAP[e.key.toLowerCase()];
  if (baseMidi === undefined) return;
  const midi = baseMidi + (octave - 4) * 12;
  if (!sustain) stopNote(midi);
});

// ─── Controles de painel ────────────────────────────────────────────────────
document.getElementById('vol').addEventListener('input', function() {
  volume = this.value / 100;
  document.getElementById('vol-val').textContent = this.value;
});
document.getElementById('rvol').addEventListener('input', function() {
  rhythmVol = this.value / 100;
  document.getElementById('rvol-val').textContent = this.value;
});
document.getElementById('tempo').addEventListener('input', function() {
  tempo = parseInt(this.value);
  document.getElementById('tempo-val').textContent = this.value;
  document.getElementById('led-octave').textContent = `Oitava: ${octave} | BPM: ${tempo}`;
  if (metro) { clearInterval(metroInterval); startMetro(); }
});
document.getElementById('octave').addEventListener('input', function() {
  octave = parseInt(this.value);
  document.getElementById('octave-val').textContent = this.value;
  document.getElementById('led-octave').textContent = `Oitava: ${octave} | BPM: ${tempo}`;
});
document.getElementById('sel-timbre').addEventListener('change', function() {
  timbreIdx = this.selectedIndex;
  document.getElementById('led-info').textContent = TIMBRES[timbreIdx].name;
});

// ─── Botões de efeito ────────────────────────────────────────────────────────
function toggleBtn(id) {
  document.getElementById(id).classList.toggle('active');
  return document.getElementById(id).classList.contains('active');
}

document.getElementById('btn-sustain').addEventListener('click',   () => { sustain   = toggleBtn('btn-sustain');  });
document.getElementById('btn-vibrato').addEventListener('click',   () => { vibrato   = toggleBtn('btn-vibrato');  });
document.getElementById('btn-autochord').addEventListener('click', () => { autoChord = toggleBtn('btn-autochord'); });
document.getElementById('btn-metro').addEventListener('click', () => {
  metro = toggleBtn('btn-metro');
  if (metro) startMetro();
  else { clearInterval(metroInterval); metroBeat = 0; }
});

// ─── Metrônomo ───────────────────────────────────────────────────────────────
function startMetro() {
  const interval = Math.round(60000 / tempo);
  metroBeat = 0;
  metroInterval = setInterval(() => {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.frequency.value = metroBeat % 4 === 0 ? 880 : 660;
    g.gain.setValueAtTime(0.25 * rhythmVol, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.07);
    document.getElementById('led-note').textContent = metroBeat % 4 === 0 ? '♩' : '·';
    metroBeat++;
  }, interval);
}

// ─── Gravação ────────────────────────────────────────────────────────────────
document.getElementById('btn-rec').addEventListener('click', function() {
  if (!isRecording) {
    isRecording   = true;
    recordedNotes = [];
    recStart      = Date.now();
    this.classList.add('active');
    document.getElementById('btn-play').disabled = true;
    setStatus('● Gravando… toque as notas agora');
  } else {
    isRecording = false;
    this.classList.remove('active');
    const hasNotes = recordedNotes.length > 0;
    document.getElementById('btn-play').disabled = !hasNotes;
    setStatus(hasNotes
      ? `Gravação concluída: ${recordedNotes.length} notas gravadas`
      : 'Nenhuma nota foi gravada');
  }
});

document.getElementById('btn-play').addEventListener('click', function() {
  if (!recordedNotes.length) return;
  this.classList.add('active');
  setStatus('▶ Reproduzindo…');
  recordedNotes.forEach(n => {
    setTimeout(() => {
      const el = document.querySelector(`[data-midi="${n.midi}"]`);
      playNote(n.midi, el);
    }, n.time);
  });
  const lastTime = recordedNotes[recordedNotes.length - 1].time;
  setTimeout(() => {
    document.getElementById('btn-play').classList.remove('active');
    setStatus('Reprodução concluída');
  }, lastTime + 1800);
});

document.getElementById('btn-stop').addEventListener('click', () => {
  isRecording = false;
  document.getElementById('btn-rec').classList.remove('active');
  Object.keys(activeNodes).forEach(m => stopNote(parseInt(m)));
  setStatus('Parado');
});

document.getElementById('btn-clear').addEventListener('click', () => {
  recordedNotes = [];
  document.getElementById('btn-play').disabled = true;
  setStatus('Gravação apagada');
});

// ─── Demo ────────────────────────────────────────────────────────────────────
document.getElementById('btn-demo').addEventListener('click', () => {
  const song    = DEMO_SONGS[demoIdx % DEMO_SONGS.length];
  const ritmo   = document.getElementById('sel-ritmo');
  const interval = Math.round(60000 / tempo);
  demoIdx++;
  setStatus(`♪ Demo ${demoIdx} — ${ritmo.options[ritmo.selectedIndex].text}`);
  song.forEach((midi, i) => {
    setTimeout(() => {
      const adj = midi + (octave - 4) * 12;
      const el  = document.querySelector(`[data-midi="${adj}"]`);
      playNote(adj, el);
    }, i * interval);
  });
});

// ─── Inicialização ───────────────────────────────────────────────────────────
buildKeyboard();
// Re-posicionar teclas pretas após renderização
setTimeout(buildKeyboard, 250);
</script>
